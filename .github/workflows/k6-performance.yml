name: Pruebas de rendimiento K6

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Perfil de ejecución
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - stress
  push:
    branches:
      - develop
    paths:
      - "test/auto-pruebas-k6/**"
      - ".github/workflows/k6-performance.yml"
  schedule:
    - cron: "0 11 * * 1"

permissions:
  contents: read

concurrency:
  group: k6-performance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  k6-performance:
    name: K6 - ${{ github.event_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      K6_FRONTEND_URL: ${{ vars.K6_FRONTEND_URL }}
      K6_BACKEND_URL: ${{ vars.K6_BACKEND_URL }}
      K6_LOGIN_EMAIL: ${{ secrets.K6_LOGIN_EMAIL }}
      K6_LOGIN_PASSWORD: ${{ secrets.K6_LOGIN_PASSWORD }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Seleccionar perfil
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ inputs.profile }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            PROFILE="load"
          else
            PROFILE="smoke"
          fi
          echo "K6_PROFILE=$PROFILE" >> "$GITHUB_ENV"
          echo "Perfil seleccionado: $PROFILE"

      - name: Validar variables y secretos
        shell: bash
        run: |
          missing=0
          for name in K6_FRONTEND_URL K6_BACKEND_URL K6_LOGIN_EMAIL K6_LOGIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name no está configurado."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Preparar K6
        uses: grafana/setup-k6-action@v1

      - name: Crear carpeta de resultados
        run: mkdir -p artifacts/k6

      - name: Ejecutar carga de catálogo
        env:
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_EXPORT: artifacts/k6/reporte-catalogo.html
        run: |
          k6 run \
            --summary-export=artifacts/k6/resumen-catalogo.json \
            test/auto-pruebas-k6/ecommerce-test.js \
            2>&1 | tee artifacts/k6/salida-catalogo.txt

      - name: Ejecutar carga de autenticación
        env:
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_EXPORT: artifacts/k6/reporte-login.html
        run: |
          k6 run \
            --summary-export=artifacts/k6/resumen-login.json \
            test/auto-pruebas-k6/ecommerce-test-login.js \
            2>&1 | tee artifacts/k6/salida-login.txt

      - name: Publicar reportes de la ejecución
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-${{ env.K6_PROFILE }}-${{ github.run_number }}
          path: artifacts/k6/
          if-no-files-found: warn
          retention-days: 30
